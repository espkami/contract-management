name: contract-management

services:
  contract-management:
    build: .
    image: ${DOCKER_IMAGE:-contract-management:latest}
    container_name: contract-management
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - contract_data:/data
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@contract.com}

volumes:
  contract_data:
    driver: local